<!DOCTYPE html>
<html lang="en">
<head>
  <script>!function(){var t=localStorage.getItem('jp_theme')||'light';document.documentElement.setAttribute('data-theme',t);}();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Shaghlni</title>
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/pages.css">
  <link rel="stylesheet" href="../../css/responsive.css">
  <link rel="stylesheet" href="../../css/dark-mode.css">
  <link rel="stylesheet" href="../../css/rtl.css">
  <link rel="stylesheet" href="../../css/motion.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-form-side">
    <a href="../../index.html" class="auth-brand" aria-label="Shaghlni home">
      <img src="../../assets/images/shaghlni-logo.jpeg" alt="Shaghlni" class="brand-logo-img brand-logo-img--auth">
    </a>

    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;max-width:400px">
      <div style="width:64px;height:64px;border-radius:50%;background:var(--clr-primary-light);display:flex;align-items:center;justify-content:center;margin-bottom:var(--sp-6)">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-subtitle">Enter your new password below. Make sure it's strong and memorable.</p>

      <form id="reset-form" novalidate>
        <div class="form-group" style="margin-bottom:var(--sp-4)">
          <label class="form-label" for="new-password">New Password</label>
          <div class="input-group">
            <input type="password" name="password" id="new-password" class="form-input" placeholder="New password" autocomplete="new-password">
            <button type="button" class="input-icon-right" id="toggle-np" aria-label="Toggle password">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:var(--sp-6)">
          <label class="form-label" for="confirm-password">Confirm New Password</label>
          <div class="input-group">
            <input type="password" name="confirm_password" id="confirm-password" class="form-input" placeholder="Confirm new password" autocomplete="new-password">
            <button type="button" class="input-icon-right" id="toggle-cp" aria-label="Toggle password">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Reset Password →</button>
      </form>
    </div>
  </div>

  <div class="auth-image-side">
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,101,204,.4) 0%,rgba(0,0,0,.7) 100%);z-index:0"></div>
    <div style="position:absolute;inset:0;background:linear-gradient(135deg,#1a2744 0%,#0a1628 100%);z-index:-1"></div>
    <div class="auth-image-content">
      <h2 class="auth-image-title">Create a strong password<br>to keep your account safe.</h2>
      <div class="auth-image-stats">
        <div class="auth-image-stat"><div class="auth-image-stat__value">1,75,324</div><div class="auth-image-stat__label">Live Jobs</div></div>
        <div class="auth-image-stat"><div class="auth-image-stat__value">97,354</div><div class="auth-image-stat__label">Companies</div></div>
        <div class="auth-image-stat"><div class="auth-image-stat__value">7,532</div><div class="auth-image-stat__label">New Jobs</div></div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../../js/api.js"></script>
<script src="../../js/theme.js"></script>
  <script src="../../js/i18n.js"></script>
<script src="../../js/main.js"></script>
<script>
  document.getElementById('toggle-np').addEventListener('click', () => {
    const i = document.getElementById('new-password'); i.type = i.type === 'password' ? 'text' : 'password';
  });
  document.getElementById('toggle-cp').addEventListener('click', () => {
    const i = document.getElementById('confirm-password'); i.type = i.type === 'password' ? 'text' : 'password';
  });
  document.getElementById('reset-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const pw = document.getElementById('new-password').value;
    const cpw = document.getElementById('confirm-password').value;
    if (pw.length < 8) { Toast.error('Password must be at least 8 characters.'); return; }
    if (pw !== cpw) { Toast.error('Passwords do not match.'); return; }
    Toast.success('Password reset successfully!');
    setTimeout(() => { window.location.href = 'login.html'; }, 1500);
  });
</script>
</body>
</html>
