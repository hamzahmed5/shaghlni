<!DOCTYPE html>
<html lang="en">
<head>
  <script>!function(){var t=localStorage.getItem("jp_theme")||"light";document.documentElement.setAttribute("data-theme",t);}();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Jobpilot</title>
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/pages.css">
  <link rel="stylesheet" href="../../css/responsive.css">
  <link rel="stylesheet" href="../../css/dark-mode.css">
  <link rel="stylesheet" href="../../css/rtl.css">
</head>
<body>

<div class="auth-page">
  <!-- ─── Form Side ──────────────────────────────────── -->
  <div class="auth-form-side">
    <a href="../../index.html" class="auth-brand" aria-label="Shaghlni home">
      <img src="../../assets/images/shaghlni-logo.jpeg" alt="Shaghlni" class="brand-logo-img brand-logo-img--auth">
    </a>

    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;max-width:420px">
      <h1 class="auth-title">Create account.</h1>
      <p class="auth-subtitle">Already have account? <a href="login.html">Log In</a></p>

      <!-- Role toggle -->
      <div style="margin-bottom:var(--sp-2);font-size:12px;font-weight:600;color:var(--clr-text-3);text-transform:uppercase;letter-spacing:.06em">Create account as a</div>
      <div class="auth-role-toggle" style="margin-bottom:var(--sp-6)">
        <button type="button" class="auth-role-btn active" data-role="candidate">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          Candidate
        </button>
        <button type="button" class="auth-role-btn" data-role="employer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          Employer
        </button>
      </div>

      <form id="register-form" novalidate>
        <div class="form-group" style="margin-bottom:var(--sp-4)">
          <label class="form-label" for="reg-fullname">Full Name</label>
          <input type="text" name="full_name" id="reg-fullname" class="form-input" placeholder="Full name" autocomplete="name">
        </div>
        <div class="form-group" style="margin-bottom:var(--sp-4)">
          <label class="form-label" for="reg-email">Email address</label>
          <input type="email" name="email" id="reg-email" class="form-input" placeholder="Email address" autocomplete="email">
        </div>
        <div class="form-group" style="margin-bottom:var(--sp-4)">
          <label class="form-label" for="reg-password">Password</label>
          <div class="input-group">
            <input type="password" name="password" id="reg-password" class="form-input" placeholder="Password" autocomplete="new-password">
            <button type="button" class="input-icon-right" id="toggle-pw" aria-label="Show/hide password">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:var(--sp-5)">
          <label class="form-label" for="reg-confirm">Confirm Password</label>
          <div class="input-group">
            <input type="password" name="confirm_password" id="reg-confirm" class="form-input" placeholder="Confirm Password" autocomplete="new-password">
            <button type="button" class="input-icon-right" id="toggle-cpw" aria-label="Show/hide password">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <label class="form-check" style="margin-bottom:var(--sp-6)">
          <input type="checkbox" name="terms" id="reg-terms" required>
          <span class="form-check-label">I've read and agree with your <a href="../static/terms.html" style="color:var(--clr-primary)">Terms of Services</a></span>
        </label>

        <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account →</button>
      </form>

      <div class="auth-divider">or</div>
      <div style="display:flex;gap:var(--sp-3)">
        <button type="button" class="auth-social-btn" style="flex:1">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" fill="#0077B5"/></svg>
          Sign up with LinkedIn
        </button>
        <button type="button" class="auth-social-btn" style="flex:1">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Sign up with Google
        </button>
      </div>
    </div>
  </div>

  <!-- ─── Image Side ──────────────────────────────────── -->
  <div class="auth-image-side">
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(245,158,11,.25) 0%,rgba(0,0,0,.75) 100%);z-index:0"></div>
    <div style="position:absolute;inset:0;background:linear-gradient(135deg,#1a1200 0%,#0a0800 100%);z-index:-1"></div>
    <div class="auth-image-content">
      <h2 class="auth-image-title">Over 175,324 candidates<br>waiting for great employers.</h2>
      <div class="auth-image-stats">
        <div class="auth-image-stat"><div class="auth-image-stat__value">175,324</div><div class="auth-image-stat__label">Live Jobs</div></div>
        <div class="auth-image-stat"><div class="auth-image-stat__value">97,354</div><div class="auth-image-stat__label">Companies</div></div>
        <div class="auth-image-stat"><div class="auth-image-stat__value">7,532</div><div class="auth-image-stat__label">New Jobs</div></div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../../js/api.js"></script>
<script src="../../js/theme.js"></script>
  <script src="../../js/i18n.js"></script>
<script src="../../js/main.js"></script>
<script src="../../js/pages.js"></script>
<script>
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const i = document.getElementById('reg-password');
    i.type = i.type === 'password' ? 'text' : 'password';
  });
  document.getElementById('toggle-cpw').addEventListener('click', () => {
    const i = document.getElementById('reg-confirm');
    i.type = i.type === 'password' ? 'text' : 'password';
  });
</script>
</body>
</html>
