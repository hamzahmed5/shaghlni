<!DOCTYPE html>
<html lang="en">
<head>
  <script>!function(){var t=localStorage.getItem('jp_theme')||'light';document.documentElement.setAttribute('data-theme',t);}();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Verification — Shaghlni</title>
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/pages.css">
  <link rel="stylesheet" href="../../css/responsive.css">
  <link rel="stylesheet" href="../../css/dark-mode.css">
  <link rel="stylesheet" href="../../css/rtl.css">
  <link rel="stylesheet" href="../../css/motion.css">
</head>
<body style="background:var(--clr-bg);min-height:100vh;display:flex;align-items:center;justify-content:center;">

<div style="max-width:460px;width:100%;margin:var(--sp-6)">
  <!-- Brand -->
  <div style="text-align:center;margin-bottom:var(--sp-10)">
    <a href="../../index.html" aria-label="Shaghlni home">
      <img src="../../assets/images/shaghlni-logo.jpeg" alt="Shaghlni" class="brand-logo-img brand-logo-img--auth" style="margin:0 auto">
    </a>
  </div>

  <div style="background:var(--clr-white);border-radius:var(--r-xl);padding:var(--sp-10) var(--sp-8);text-align:center;box-shadow:var(--shadow-md)">
    <!-- Icon -->
    <div style="width:80px;height:80px;border-radius:50%;background:var(--clr-primary-light);display:flex;align-items:center;justify-content:center;margin:0 auto var(--sp-6)">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </div>

    <h2 style="font-size:var(--text-2xl);margin-bottom:var(--sp-3)">Check your email</h2>
    <p style="color:var(--clr-text-3);margin-bottom:var(--sp-8)">
      We've sent a verification link to your email address. Click the link in the email to verify your account and get started.
    </p>

    <!-- OTP inputs -->
    <p style="font-size:14px;font-weight:600;color:var(--clr-text);margin-bottom:var(--sp-4)">Enter verification code</p>
    <div style="display:flex;gap:12px;justify-content:center;margin-bottom:var(--sp-8)" id="otp-wrap">
      <input type="text" maxlength="1" class="form-input otp-input" style="width:52px;height:52px;text-align:center;font-size:24px;font-weight:700;padding:0" aria-label="Code digit 1">
      <input type="text" maxlength="1" class="form-input otp-input" style="width:52px;height:52px;text-align:center;font-size:24px;font-weight:700;padding:0" aria-label="Code digit 2">
      <input type="text" maxlength="1" class="form-input otp-input" style="width:52px;height:52px;text-align:center;font-size:24px;font-weight:700;padding:0" aria-label="Code digit 3">
      <input type="text" maxlength="1" class="form-input otp-input" style="width:52px;height:52px;text-align:center;font-size:24px;font-weight:700;padding:0" aria-label="Code digit 4">
      <input type="text" maxlength="1" class="form-input otp-input" style="width:52px;height:52px;text-align:center;font-size:24px;font-weight:700;padding:0" aria-label="Code digit 5">
      <input type="text" maxlength="1" class="form-input otp-input" style="width:52px;height:52px;text-align:center;font-size:24px;font-weight:700;padding:0" aria-label="Code digit 6">
    </div>

    <button class="btn btn-primary btn-block btn-lg" id="verify-btn">Verify Email →</button>

    <p style="margin-top:var(--sp-5);font-size:14px;color:var(--clr-text-3)">
      Didn't receive the email?
      <button type="button" style="color:var(--clr-primary);font-weight:500;background:none;border:none;cursor:pointer;font-size:14px" id="resend-btn">Resend</button>
    </p>
  </div>

  <p style="text-align:center;margin-top:var(--sp-5);font-size:14px;color:var(--clr-text-3)">
    <a href="login.html" style="color:var(--clr-primary)">← Back to Sign In</a>
  </p>
</div>

<div id="toast-container"></div>
<script src="../../js/api.js"></script>
<script src="../../js/theme.js"></script>
  <script src="../../js/i18n.js"></script>
<script src="../../js/main.js"></script>
<script>
  // OTP auto-focus next input
  document.querySelectorAll('.otp-input').forEach((input, index, inputs) => {
    input.addEventListener('input', () => {
      if (input.value && index < inputs.length - 1) inputs[index + 1].focus();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !input.value && index > 0) inputs[index - 1].focus();
    });
  });

  document.getElementById('resend-btn').addEventListener('click', () => {
    Toast.info('Verification email resent!');
  });

  document.getElementById('verify-btn').addEventListener('click', () => {
    const code = Array.from(document.querySelectorAll('.otp-input')).map(i => i.value).join('');
    if (code.length < 6) {
      Toast.error('Please enter the complete 6-digit code.');
      return;
    }
    Toast.success('Email verified! Redirecting...');
    setTimeout(() => { window.location.href = 'login.html'; }, 1500);
  });
</script>
</body>
</html>
