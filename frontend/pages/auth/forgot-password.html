<!DOCTYPE html>
<html lang="en">
<head>
  <script>!function(){var t=localStorage.getItem('jp_theme')||'light';document.documentElement.setAttribute('data-theme',t);}();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Shaghlni</title>
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/pages.css">
  <link rel="stylesheet" href="../../css/responsive.css">
  <link rel="stylesheet" href="../../css/dark-mode.css">
  <link rel="stylesheet" href="../../css/rtl.css">
  <link rel="stylesheet" href="../../css/motion.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-form-side">
    <a href="../../index.html" class="auth-brand" aria-label="Shaghlni home">
      <img src="../../assets/images/shaghlni-logo.jpeg" alt="Shaghlni" class="brand-logo-img brand-logo-img--auth">
    </a>

    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;max-width:400px">
      <div style="width:64px;height:64px;border-radius:50%;background:var(--clr-primary-light);display:flex;align-items:center;justify-content:center;margin-bottom:var(--sp-6)">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1 class="auth-title">Forget Password?</h1>
      <p class="auth-subtitle">
        Enter the email address associated with your account and we'll send you a link to reset your password.
      </p>

      <form id="forgot-form" novalidate>
        <div class="form-group" style="margin-bottom:var(--sp-6)">
          <label class="form-label" for="forgot-email">Email address</label>
          <input type="email" name="email" id="forgot-email" class="form-input" placeholder="Enter your email address" autocomplete="email">
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="forgot-btn">
          Send Reset Link →
        </button>
      </form>

      <p style="text-align:center;margin-top:var(--sp-6);font-size:14px;color:var(--clr-text-3)">
        Remember password? <a href="login.html" style="color:var(--clr-primary);font-weight:500">Sign In</a>
      </p>
    </div>
  </div>

  <div class="auth-image-side">
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(245,158,11,.25) 0%,rgba(0,0,0,.75) 100%);z-index:0"></div>
    <div style="position:absolute;inset:0;background:linear-gradient(135deg,#1a1200 0%,#0a0800 100%);z-index:-1"></div>
    <div class="auth-image-content">
      <h2 class="auth-image-title">Over 1,75,324 candidates<br>waiting for good employees.</h2>
      <div class="auth-image-stats">
        <div class="auth-image-stat"><div class="auth-image-stat__value">1,75,324</div><div class="auth-image-stat__label">Live Jobs</div></div>
        <div class="auth-image-stat"><div class="auth-image-stat__value">97,354</div><div class="auth-image-stat__label">Companies</div></div>
        <div class="auth-image-stat"><div class="auth-image-stat__value">7,532</div><div class="auth-image-stat__label">New Jobs</div></div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../../js/api.js"></script>
<script src="../../js/theme.js"></script>
  <script src="../../js/i18n.js"></script>
<script src="../../js/main.js"></script>
<script>
  document.getElementById('forgot-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('forgot-email');
    if (!email.value || !/\S+@\S+\.\S+/.test(email.value)) {
      email.classList.add('error');
      return;
    }
    const btn = document.getElementById('forgot-btn');
    btn.disabled = true;
    btn.textContent = 'Sending...';
    // Simulate send — no API endpoint defined for this
    setTimeout(() => {
      Toast.success('Reset link sent! Check your inbox.');
      setTimeout(() => { window.location.href = 'email-verification.html'; }, 1500);
    }, 1000);
  });
</script>
</body>
</html>
