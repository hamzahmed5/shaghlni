<!DOCTYPE html>
<html lang="en">
<head>
  <script>!function(){var t=localStorage.getItem('jp_theme')||'light';document.documentElement.setAttribute('data-theme',t);}();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Complete — Shaghlni</title>
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/pages.css">
  <link rel="stylesheet" href="../../css/responsive.css">
  <style>
    .setup-steps { display:flex; margin-bottom:40px; }
    .setup-step { flex:1; text-align:center; position:relative; }
    .setup-step::after { content:''; position:absolute; top:16px; left:50%; width:100%; height:2px; background:var(--clr-border); z-index:0; }
    .setup-step:last-child::after { display:none; }
    .setup-step__dot { width:32px; height:32px; border-radius:50%; background:var(--clr-border); color:var(--clr-text-3); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; margin:0 auto 8px; position:relative; z-index:1; }
    .setup-step--done .setup-step__dot { background:var(--clr-primary); color:#fff; }
    .setup-step__label { font-size:12px; color:var(--clr-text-3); }
    .setup-step--done .setup-step__label { color:var(--clr-primary); font-weight:500; }
  </style>
  <link rel="stylesheet" href="../../css/dark-mode.css">
  <link rel="stylesheet" href="../../css/rtl.css">
  <link rel="stylesheet" href="../../css/motion.css">
</head>
<body style="background:var(--clr-bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px">

  <a href="../../index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:40px">
    <img src="../../assets/images/shaghlni-logo.jpeg" alt="Shaghlni" class="brand-logo-img brand-logo-img--nav">
    <img src="../../assets/images/shaghlni-logo.jpeg" alt="Shaghlni" class="brand-logo-img brand-logo-img--nav">
  </a>

  <div style="background:var(--clr-white);border:1px solid var(--clr-border);border-radius:var(--r-lg);padding:40px;width:100%;max-width:640px;text-align:center">

    <!-- Step Indicator (all done) -->
    <div class="setup-steps">
      <div class="setup-step setup-step--done"><div class="setup-step__dot"></div><div class="setup-step__label">Personal</div></div>
      <div class="setup-step setup-step--done"><div class="setup-step__dot"></div><div class="setup-step__label">Profile</div></div>
      <div class="setup-step setup-step--done"><div class="setup-step__dot"></div><div class="setup-step__label">Social</div></div>
      <div class="setup-step setup-step--done"><div class="setup-step__dot"></div><div class="setup-step__label">Contact</div></div>
      <div class="setup-step setup-step--done"><div class="setup-step__dot"></div><div class="setup-step__label">Finish</div></div>
    </div>

    <!-- Success illustration -->
    <div style="width:96px;height:96px;border-radius:50%;background:rgba(245,158,11,0.10);display:flex;align-items:center;justify-content:center;margin:0 auto var(--sp-6)">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>

    <h1 style="font-size:28px;font-weight:700;color:var(--clr-text);margin-bottom:var(--sp-3)">Your Profile is Ready!</h1>
    <p style="color:var(--clr-text-3);font-size:16px;max-width:400px;margin:0 auto var(--sp-8);line-height:1.6">
      Your employer account is set up and ready. Start posting jobs and finding the best candidates for your team.
    </p>

    <div style="display:flex;align-items:center;justify-content:center;gap:var(--sp-4);flex-wrap:wrap">
      <a href="dashboard.html" class="btn btn-primary" style="min-width:180px">
        Go to Dashboard →
      </a>
      <a href="post-job.html" class="btn btn-outline-primary" style="min-width:180px">
        Post a Job
      </a>
    </div>

    <p style="margin-top:var(--sp-8);font-size:13px;color:var(--clr-text-3)">
      You can always update your profile from <a href="settings-personal.html" style="color:var(--clr-primary)">Settings</a>.
    </p>
  </div>

<div id="toast-container"></div>
<script src="../../js/api.js"></script>
<script src="../../js/theme.js"></script>
  <script src="../../js/i18n.js"></script>
<script src="../../js/main.js"></script>
<script src='../../js/auth-guard.js'></script>
</body>
</html>
