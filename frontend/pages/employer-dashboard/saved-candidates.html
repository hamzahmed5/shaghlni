<script src='../../js/auth-guard.js'></script>
<script>
(async () => {

  // Auth guard
  const user = await Session.requireLogin('employer');
  if (user) {
    const initials = user.name ? user.name.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase() : 'TC';
    document.getElementById('nav-user-avatar').textContent = initials;
    document.getElementById('sidebar-avatar').textContent = initials;
    document.getElementById('sidebar-name').textContent = user.name || 'TechCorp Inc.';
  }

  const ACCENT_COLORS = ['#f59e0b','#d97706','#0BA02C','#0d9488','#7c3aed','#e11d48'];

  function renderGrid(candidates) {
    document.getElementById('saved-count').textContent =
      `${candidates.length} saved candidate${candidates.length !== 1 ? 's' : ''}`;

    if (!candidates.length) {
      document.getElementById('saved-grid').innerHTML = `<div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <h3>No saved candidates yet</h3>
        <p><a href="../candidates/browse-candidates.html" style="color:var(--clr-primary)">Browse candidates</a> to save ones you're interested in.</p>
      </div>`;
      return;
    }

    document.getElementById('saved-grid').innerHTML = candidates.map((c, i) => {
      const name  = c.full_name || '—';
      const ini   = name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
      const color = ACCENT_COLORS[i % ACCENT_COLORS.length];
      const skills = c.primary_skills ? c.primary_skills.split(',').map(s => s.trim()).filter(Boolean).slice(0, 4) : [];
      return `<div style="background:var(--clr-white);border:1px solid var(--clr-border);border-radius:var(--r-lg);padding:var(--sp-5);display:flex;align-items:center;gap:var(--sp-5);flex-wrap:wrap">
        <div style="width:56px;height:56px;border-radius:50%;background:${color}20;color:${color};display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0">${ini}</div>
        <div style="flex:1;min-width:160px">
          <h3 style="font-size:15px;font-weight:600;color:var(--clr-text);margin-bottom:2px">${name}</h3>
          <p style="font-size:13px;color:var(--clr-text-2);margin-bottom:var(--sp-2)">${c.headline || '—'}</p>
          <div style="display:flex;align-items:center;gap:var(--sp-3);flex-wrap:wrap;font-size:12px;color:var(--clr-text-3)">
            ${c.location ? `<span style="display:flex;align-items:center;gap:3px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${c.location}</span>` : ''}
            ${c.experience_years ? `<span>${c.experience_years} yr exp.</span>` : ''}
          </div>
          ${skills.length ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:var(--sp-2)">${skills.map(s => `<span style="font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:var(--clr-primary-light);color:var(--clr-primary)">${s}</span>`).join('')}</div>` : ''}
        </div>
        <div style="display:flex;gap:var(--sp-2)">
          <a href="../candidates/single-candidate.html?id=${c.id}" class="btn btn-outline-primary btn-sm">View Profile</a>
          <button class="btn btn-ghost btn-sm" style="color:var(--clr-danger)" data-unsave="${c.id}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" fill="currentColor"/></svg>
            Remove
          </button>
        </div>
      </div>`;
    }).join('');

    document.querySelectorAll('[data-unsave]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.unsave;
        try {
          await apiFetch(`/employer/saved-candidates/${id}`, { method: 'DELETE' });
          Toast.success('Removed from saved candidates.');
          await loadSaved();
        } catch {
          Toast.error('Failed to remove candidate.');
        }
      });
    });
  }

  async function loadSaved() {
    const grid = document.getElementById('saved-grid');
    grid.innerHTML = '<div class="skeleton" style="height:88px;border-radius:var(--r-lg)"></div>'.repeat(3);
    try {
      const data = await apiFetch('/employer/saved-candidates');
      renderGrid(Array.isArray(data.data) ? data.data : []);
    } catch {
      renderGrid([]);
      Toast.error('Failed to load saved candidates.');
    }
  }

  await loadSaved();
})();
</script>
