<!DOCTYPE html>
<html lang="en">
<head>
  <script>!function(){var t=localStorage.getItem('jp_theme')||'light';document.documentElement.setAttribute('data-theme',t);}();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Up Your Account — Step 3 — Shaghlni</title>
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/pages.css">
  <link rel="stylesheet" href="../../css/responsive.css">
  <style>
    .setup-steps { display:flex; margin-bottom:40px; }
    .setup-step { flex:1; text-align:center; position:relative; }
    .setup-step::after { content:''; position:absolute; top:16px; left:50%; width:100%; height:2px; background:var(--clr-border); z-index:0; }
    .setup-step:last-child::after { display:none; }
    .setup-step__dot { width:32px; height:32px; border-radius:50%; background:var(--clr-border); color:var(--clr-text-3); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; margin:0 auto 8px; position:relative; z-index:1; }
    .setup-step--active .setup-step__dot { background:var(--clr-primary); color:#fff; }
    .setup-step--done .setup-step__dot { background:var(--clr-primary); color:#fff; }
    .setup-step__label { font-size:12px; color:var(--clr-text-3); }
    .setup-step--active .setup-step__label,
    .setup-step--done .setup-step__label { color:var(--clr-primary); font-weight:500; }
    .social-input-wrap { position:relative; }
    .social-input-wrap svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); pointer-events:none; }
    .social-input-wrap input { padding-left:40px; }
  </style>
  <link rel="stylesheet" href="../../css/dark-mode.css">
  <link rel="stylesheet" href="../../css/rtl.css">
  <link rel="stylesheet" href="../../css/motion.css">
</head>
<body style="background:var(--clr-bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px">

  <a href="../../index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:40px">
    <img src="../../assets/images/shaghlni-logo.jpeg" alt="Shaghlni" class="brand-logo-img brand-logo-img--nav">
    <img src="../../assets/images/shaghlni-logo.jpeg" alt="Shaghlni" class="brand-logo-img brand-logo-img--nav">
  </a>

  <div style="background:var(--clr-white);border:1px solid var(--clr-border);border-radius:var(--r-lg);padding:40px;width:100%;max-width:640px">

    <!-- Step Indicator -->
    <div class="setup-steps">
      <div class="setup-step setup-step--done">
        <div class="setup-step__dot"></div>
        <div class="setup-step__label">Personal</div>
      </div>
      <div class="setup-step setup-step--done">
        <div class="setup-step__dot"></div>
        <div class="setup-step__label">Profile</div>
      </div>
      <div class="setup-step setup-step--active">
        <div class="setup-step__dot">3</div>
        <div class="setup-step__label">Social</div>
      </div>
      <div class="setup-step">
        <div class="setup-step__dot">4</div>
        <div class="setup-step__label">Contact</div>
      </div>
      <div class="setup-step">
        <div class="setup-step__dot">5</div>
        <div class="setup-step__label">Finish</div>
      </div>
    </div>

    <h1 style="font-size:var(--text-2xl);font-weight:700;color:var(--clr-text);margin-bottom:6px">Social Links</h1>
    <p style="color:var(--clr-text-3);margin-bottom:var(--sp-8)">Add your social profiles to build trust with candidates.</p>

    <form id="setup-form-3">
      <!-- LinkedIn -->
      <div class="form-group" style="margin-bottom:var(--sp-5)">
        <label class="form-label" for="linkedin">LinkedIn</label>
        <div class="social-input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#0A66C2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
          <input class="form-input" type="url" id="linkedin" placeholder="https://linkedin.com/company/yourcompany">
        </div>
      </div>

      <!-- Twitter/X -->
      <div class="form-group" style="margin-bottom:var(--sp-5)">
        <label class="form-label" for="twitter">Twitter / X</label>
        <div class="social-input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#474C54" stroke-width="2"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg>
          <input class="form-input" type="url" id="twitter" placeholder="https://twitter.com/yourcompany">
        </div>
      </div>

      <!-- GitHub -->
      <div class="form-group" style="margin-bottom:var(--sp-5)">
        <label class="form-label" for="github">GitHub</label>
        <div class="social-input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#474C54" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
          <input class="form-input" type="url" id="github" placeholder="https://github.com/yourcompany">
        </div>
      </div>

      <!-- Website -->
      <div class="form-group" style="margin-bottom:var(--sp-5)">
        <label class="form-label" for="website-social">Company Website</label>
        <div class="social-input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#474C54" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          <input class="form-input" type="url" id="website-social" placeholder="https://yourcompany.com">
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;margin-top:var(--sp-8)">
        <a href="account-setup-profile.html" class="btn btn-ghost">← Back</a>
        <button type="submit" class="btn btn-primary">Save & Next →</button>
      </div>
    </form>
  </div>

<div id="toast-container"></div>
<script src="../../js/api.js"></script>
<script src="../../js/theme.js"></script>
  <script src="../../js/i18n.js"></script>
<script src="../../js/main.js"></script>
<script src='../../js/auth-guard.js'></script>
<script>
  document.getElementById('setup-form-3').addEventListener('submit', function(e) {
    e.preventDefault();
    const fields = ['linkedin','twitter','github','website-social'];
    for (const id of fields) {
      const val = document.getElementById(id).value.trim();
      if (val && !val.startsWith('http')) {
        Toast.warning('Please enter valid URLs starting with http.');
        return;
      }
    }
    Toast.success('Saved! Proceeding to next step.');
    setTimeout(() => window.location.href = 'account-setup-contact.html', 800);
  });
</script>
</body>
</html>
