<!DOCTYPE html>
<html lang="en">
<head>
  <script>!function(){var t=localStorage.getItem('jp_theme')||'light';document.documentElement.setAttribute('data-theme',t);}();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Up Your Account — Step 4 — Shaghlni</title>
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/pages.css">
  <link rel="stylesheet" href="../../css/responsive.css">
  <style>
    .setup-steps { display:flex; margin-bottom:40px; }
    .setup-step { flex:1; text-align:center; position:relative; }
    .setup-step::after { content:''; position:absolute; top:16px; left:50%; width:100%; height:2px; background:var(--clr-border); z-index:0; }
    .setup-step:last-child::after { display:none; }
    .setup-step__dot { width:32px; height:32px; border-radius:50%; background:var(--clr-border); color:var(--clr-text-3); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; margin:0 auto 8px; position:relative; z-index:1; }
    .setup-step--active .setup-step__dot { background:var(--clr-primary); color:#fff; }
    .setup-step--done .setup-step__dot { background:var(--clr-primary); color:#fff; }
    .setup-step__label { font-size:12px; color:var(--clr-text-3); }
    .setup-step--active .setup-step__label,
    .setup-step--done .setup-step__label { color:var(--clr-primary); font-weight:500; }
  </style>
  <link rel="stylesheet" href="../../css/dark-mode.css">
  <link rel="stylesheet" href="../../css/rtl.css">
  <link rel="stylesheet" href="../../css/motion.css">
</head>
<body style="background:var(--clr-bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px">

  <a href="../../index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:40px">
    <img src="../../assets/images/shaghlni-logo.jpeg" alt="Shaghlni" class="brand-logo-img brand-logo-img--nav">
    <img src="../../assets/images/shaghlni-logo.jpeg" alt="Shaghlni" class="brand-logo-img brand-logo-img--nav">
  </a>

  <div style="background:var(--clr-white);border:1px solid var(--clr-border);border-radius:var(--r-lg);padding:40px;width:100%;max-width:640px">

    <!-- Step Indicator -->
    <div class="setup-steps">
      <div class="setup-step setup-step--done">
        <div class="setup-step__dot"></div>
        <div class="setup-step__label">Personal</div>
      </div>
      <div class="setup-step setup-step--done">
        <div class="setup-step__dot"></div>
        <div class="setup-step__label">Profile</div>
      </div>
      <div class="setup-step setup-step--done">
        <div class="setup-step__dot"></div>
        <div class="setup-step__label">Social</div>
      </div>
      <div class="setup-step setup-step--active">
        <div class="setup-step__dot">4</div>
        <div class="setup-step__label">Contact</div>
      </div>
      <div class="setup-step">
        <div class="setup-step__dot">5</div>
        <div class="setup-step__label">Finish</div>
      </div>
    </div>

    <h1 style="font-size:var(--text-2xl);font-weight:700;color:var(--clr-text);margin-bottom:6px">Contact Information</h1>
    <p style="color:var(--clr-text-3);margin-bottom:var(--sp-8)">How can candidates and applicants reach your company?</p>

    <form id="setup-form-4">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-5);margin-bottom:var(--sp-5)">
        <div class="form-group">
          <label class="form-label" for="phone">Phone Number</label>
          <input class="form-input" type="tel" id="phone" placeholder="+1 (555) 000-0000">
        </div>
        <div class="form-group">
          <label class="form-label" for="contact-email">Contact Email</label>
          <input class="form-input" type="email" id="contact-email" placeholder="hr@yourcompany.com">
        </div>
      </div>

      <div class="form-group" style="margin-bottom:var(--sp-5)">
        <label class="form-label" for="address">Address Line</label>
        <input class="form-input" type="text" id="address" placeholder="e.g. 123 Business Ave, Suite 100">
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-5);margin-bottom:var(--sp-5)">
        <div class="form-group">
          <label class="form-label" for="city">City</label>
          <input class="form-input" type="text" id="city" placeholder="e.g. New York">
        </div>
        <div class="form-group">
          <label class="form-label" for="country">Country</label>
          <select class="form-input" id="country">
            <option value="">Select country</option>
            <option>United States</option>
            <option>United Kingdom</option>
            <option>Canada</option>
            <option>Australia</option>
            <option>Germany</option>
            <option>France</option>
            <option>Jordan</option>
            <option>UAE</option>
            <option>Saudi Arabia</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;margin-top:var(--sp-8)">
        <a href="account-setup-social.html" class="btn btn-ghost">← Back</a>
        <button type="submit" class="btn btn-primary">Save & Finish →</button>
      </div>
    </form>
  </div>

<div id="toast-container"></div>
<script src="../../js/api.js"></script>
<script src="../../js/theme.js"></script>
  <script src="../../js/i18n.js"></script>
<script src="../../js/main.js"></script>
<script src='../../js/auth-guard.js'></script>
<script>
  document.getElementById('setup-form-4').addEventListener('submit', function(e) {
    e.preventDefault();
    Toast.success('All set! Your profile is ready.');
    setTimeout(() => window.location.href = 'account-setup-message.html', 800);
  });
</script>
</body>
</html>
