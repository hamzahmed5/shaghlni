<div id="toast-container"></div>
<script src="../../js/api.js"></script>
<script src="../../js/theme.js"></script>
  <script src="../../js/i18n.js"></script>
<script src="../../js/main.js"></script>
<script src='../../js/auth-guard.js'></script>
<script>
(async () => {
  const user = await Session.requireLogin('employer');
  if (user) {
    const initials = user.name ? user.name.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase() : 'TC';
    document.getElementById('nav-user-avatar').textContent = initials;
    document.getElementById('sidebar-avatar').textContent = initials;
    document.getElementById('sidebar-name').textContent = user.name || 'TechCorp Inc.';
  }

  const ACCENT_COLORS = ['#f59e0b','#0BA02C','#FF6550','#d97706','#E05151','#F59E0B'];
  function colorFor(str) { let h=0; for(const c of String(str)) h=(h*31+c.charCodeAt(0))&0xffff; return ACCENT_COLORS[h%ACCENT_COLORS.length]; }

  try {
    const res = await API.getEmployerApplications();
      const apps = Array.isArray(res.data) ? res.data : [];
      document.getElementById('apps-count').textContent = `${apps.length} application${apps.length !== 1 ? 's' : ''}`;
      if (!apps.length) {
        document.getElementById('apps-table-container').innerHTML = `<div class="empty-state" style="padding:var(--sp-10)">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          <h3>No applications yet</h3>
          <p>Applications will appear here once candidates apply to your jobs.</p>
        </div>`;
        return;
      }
      document.getElementById('apps-table-container').innerHTML = `
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="background:var(--clr-bg)">
            <th style="text-align:left;padding:var(--sp-4) var(--sp-5);font-size:13px;color:var(--clr-text-3);font-weight:500">Candidate</th>
            <th style="text-align:left;padding:var(--sp-4) var(--sp-5);font-size:13px;color:var(--clr-text-3);font-weight:500">Job</th>
            <th style="text-align:left;padding:var(--sp-4) var(--sp-5);font-size:13px;color:var(--clr-text-3);font-weight:500">Applied</th>
            <th style="text-align:left;padding:var(--sp-4) var(--sp-5);font-size:13px;color:var(--clr-text-3);font-weight:500">Status</th>
            <th style="text-align:left;padding:var(--sp-4) var(--sp-5);font-size:13px;color:var(--clr-text-3);font-weight:500">Action</th>
          </tr></thead>
          <tbody>${apps.map(a => {
            const color = colorFor(a.candidate_name || '?');
            const ini = String(a.candidate_name || '?').substring(0,2).toUpperCase();
            return `<tr style="border-top:1px solid var(--clr-border)">
              <td style="padding:var(--sp-4) var(--sp-5)">
                <div style="display:flex;align-items:center;gap:var(--sp-3)">
                  <div style="width:36px;height:36px;border-radius:50%;background:${color}20;color:${color};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${ini}</div>
                  <span style="font-size:14px;font-weight:500;color:var(--clr-text)">${a.candidate_name || '—'}</span>
                </div>
              </td>
              <td style="padding:var(--sp-4) var(--sp-5);font-size:13px;color:var(--clr-text-2)">${a.job_title || '—'}</td>
              <td style="padding:var(--sp-4) var(--sp-5);font-size:13px;color:var(--clr-text-3)">—</td>
              <td style="padding:var(--sp-4) var(--sp-5)"><span style="font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;background:rgba(245,158,11,0.12);color:#F59E0B">Pending</span></td>
              <td style="padding:var(--sp-4) var(--sp-5)"><a href="single-application.html" class="btn btn-outline-primary btn-sm">View</a></td>
            </tr>`;
          }).join('')}</tbody>
        </table>`;
    } catch {
      document.getElementById('apps-count').textContent = '—';
      document.getElementById('apps-table-container').innerHTML = `<div class="empty-state" style="padding:var(--sp-10)">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <h3>Could not load applications</h3>
        <p>Please try again later.</p>
      </div>`;
    }
})();
</script>
