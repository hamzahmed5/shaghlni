<!-- DASHBOARD LAYOUT -->
<div class="dashboard-layout">

  <!-- SIDEBAR -->

      <div class="sidebar__avatar" id="sidebar-avatar">JD</div>
      <div>
        <p class="sidebar__name" id="sidebar-name">John Doe</p>
        <p class="sidebar__role">Candidate</p>
      </div>
    </div>
    <nav class="sidebar__nav">
      <a href="dashboard.html" class="sidebar__link" data-i18n="dash.nav.overview">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Overview
      </a>
      <a href="applied-jobs.html" class="sidebar__link" data-i18n="dash.nav.applied">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Applied Jobs
      </a>
      <a href="favorite-jobs.html" class="sidebar__link" data-i18n="dash.nav.favorites">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Favorite Jobs
      </a>
      <a href="job-alerts.html" class="sidebar__link active" data-i18n="dash.nav.alerts">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Job Alerts
      </a>
      <a href="settings-personal.html" class="sidebar__link" data-i18n="dash.nav.settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </a>
    </nav>
    <button class="sidebar__logout" data-logout data-i18n="nav.sign_out">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Log-out
    </button>
  </aside>

  <!-- MAIN -->
  <main class="dashboard-main">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-6);flex-wrap:wrap;gap:var(--sp-3)">
      <div>
        <h1 style="font-size:var(--text-2xl);font-weight:700;color:var(--clr-text)">Job Alerts</h1>
        <p style="color:var(--clr-text-3);margin-top:4px">Get notified when new jobs match your criteria</p>
      </div>
      <button class="btn btn-primary" id="create-alert-btn" data-modal-open="create-alert-modal">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Create Alert
      </button>
    </div>

    <!-- Alert cards -->
    <div id="alerts-list" style="display:flex;flex-direction:column;gap:var(--sp-4);margin-bottom:var(--sp-6)"></div>

  </main>
</div>

<!-- CREATE ALERT MODAL -->
<div class="modal-overlay" id="create-alert-modal">
  <div class="modal" style="max-width:480px;width:100%">
    <div class="modal__header">
      <h3 class="modal__title">Create Job Alert</h3>
      <button class="modal__close" data-modal-close aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <form id="create-alert-form" novalidate style="padding:var(--sp-6)">
      <div class="form-group" style="margin-bottom:var(--sp-4)">
        <label class="form-label" for="alert-title">Alert Name</label>
        <input type="text" id="alert-title" class="form-input" placeholder="e.g. Frontend Jobs in NY">
      </div>
      <div class="form-group" style="margin-bottom:var(--sp-4)">
        <label class="form-label" for="alert-keyword">Keywords</label>
        <input type="text" id="alert-keyword" class="form-input" placeholder="e.g. React, Frontend, UI">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4);margin-bottom:var(--sp-4)">
        <div class="form-group">
          <label class="form-label" for="alert-location">Location</label>
          <input type="text" id="alert-location" class="form-input" placeholder="e.g. New York">
        </div>
        <div class="form-group">
          <label class="form-label" for="alert-type">Job Type</label>
          <select id="alert-type" class="form-input form-select">
            <option value="">Any Type</option>
            <option value="Full Time">Full Time</option>
            <option value="Part Time">Part Time</option>
            <option value="Remote">Remote</option>
            <option value="Contract">Contract</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:var(--sp-6)">
        <label class="form-label" for="alert-frequency">Notification Frequency</label>
        <select id="alert-frequency" class="form-input form-select">
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="instant">Instant</option>
        </select>
      </div>
      <div style="display:flex;gap:var(--sp-3);justify-content:flex-end">
        <button type="button" class="btn btn-ghost" data-modal-close>Cancel</button>
        <button type="submit" class="btn btn-primary">Create Alert</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="../../js/api.js"></script>
<script src="../../js/theme.js"></script>
  <script src="../../js/i18n.js"></script>
<script src="../../js/main.js"></script>
<script src='../../js/auth-guard.js'></script>
<script>
(async () => {

  // Auth guard
  const user = await Session.requireLogin('candidate');
  if (user) {
    const initials = user.name ? user.name.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase() : 'U';
    document.getElementById('nav-user-avatar').textContent = initials;
    document.getElementById('sidebar-avatar').textContent = initials;
    document.getElementById('sidebar-name').textContent = user.name || 'Candidate';
  }

  /* ── Live API state ─────────────────────────────────────────────────────── */
  let alerts = [];

  async function loadAlerts() {
    try {
      const data = await apiFetch('/candidate/job-alerts');
      alerts = Array.isArray(data.data) ? data.data : (Array.isArray(data) ? data : []);
    } catch {
      alerts = [];
      Toast.error('Failed to load job alerts.');
    }
    renderAlerts();
  }

  function renderAlerts() {
    const list = document.getElementById('alerts-list');
    if (!alerts.length) {
      list.innerHTML = `<div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <h3>No job alerts yet</h3>
        <p>Create an alert to get notified when matching jobs are posted.</p>
      </div>`;
      return;
    }

    list.innerHTML = alerts.map(a => {
      const enabled = a.is_active === 1 || a.is_active === true;
      return `
      <div style="background:var(--clr-white);border:1px solid var(--clr-border);border-radius:var(--r-lg);padding:var(--sp-5)">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:var(--sp-4);flex-wrap:wrap">
          <div style="flex:1;min-width:200px">
            <div style="display:flex;align-items:center;gap:var(--sp-2);margin-bottom:var(--sp-2)">
              <h3 style="font-size:15px;font-weight:600;color:var(--clr-text)">${a.title || a.name || '—'}</h3>
              <span style="font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;background:${enabled ? '#E6F4EA' : '#F3F4F6'};color:${enabled ? '#0BA02C' : '#767F8C'}">${enabled ? 'Active' : 'Paused'}</span>
            </div>
            <div style="display:flex;gap:var(--sp-4);flex-wrap:wrap;font-size:13px;color:var(--clr-text-3)">
              ${a.keywords ? `<span style="display:flex;align-items:center;gap:4px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>${a.keywords}</span>` : ''}
              ${a.location ? `<span style="display:flex;align-items:center;gap:4px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${a.location}</span>` : ''}
              <span>${[a.job_type, a.frequency].filter(Boolean).join(' · ')}</span>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:var(--sp-2)">
            <button class="btn btn-ghost btn-sm toggle-alert-btn" data-id="${a.id}" data-active="${enabled ? 1 : 0}" title="${enabled ? 'Pause alert' : 'Activate alert'}" style="color:${enabled ? '#F59E0B' : '#0BA02C'}">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${enabled ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>' : '<polygon points="5 3 19 12 5 21 5 3"/>'}</svg>
              ${enabled ? 'Pause' : 'Resume'}
            </button>
            <button class="btn btn-ghost btn-sm delete-alert-btn" data-id="${a.id}" style="color:var(--clr-danger)" title="Delete alert">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              Delete
            </button>
          </div>
        </div>
      </div>`;
    }).join('');

    list.querySelectorAll('.toggle-alert-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id      = parseInt(btn.dataset.id);
        const wasActive = btn.dataset.active === '1';
        try {
          await apiFetch(`/candidate/job-alerts/${id}`, {
            method: 'PUT',
            body: JSON.stringify({ is_active: wasActive ? 0 : 1 }),
          });
          Toast.success(wasActive ? 'Alert paused.' : 'Alert activated.');
          await loadAlerts();
        } catch {
          Toast.error('Failed to update alert.');
        }
      });
    });

    list.querySelectorAll('.delete-alert-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Delete this job alert?')) return;
        const id = parseInt(btn.dataset.id);
        try {
          await apiFetch(`/candidate/job-alerts/${id}`, { method: 'DELETE' });
          Toast.success('Alert deleted.');
          await loadAlerts();
        } catch {
          Toast.error('Failed to delete alert.');
        }
      });
    });
  }

  /* Create alert form */
  document.getElementById('create-alert-form').addEventListener('submit', async e => {
    e.preventDefault();
    const title = document.getElementById('alert-title').value.trim();
    const keywords = document.getElementById('alert-keyword').value.trim();
    if (!title) { Toast.error('Please enter an alert title.'); return; }
    const submitBtn = e.target.querySelector('[type="submit"]');
    if (submitBtn) submitBtn.disabled = true;
    try {
      const data = await apiFetch('/candidate/job-alerts', {
        method: 'POST',
        body: JSON.stringify({
          title,
          keywords,
          location:  document.getElementById('alert-location').value.trim(),
          job_type:  document.getElementById('alert-type').value,
          frequency: document.getElementById('alert-frequency').value,
        }),
      });
      if (!data.success) throw new Error(data.message);
      Modal.close('create-alert-modal');
      e.target.reset();
      Toast.success('Job alert created!');
      await loadAlerts();
    } catch (err) {
      Toast.error(err.message || 'Failed to create alert.');
    } finally {
      if (submitBtn) submitBtn.disabled = false;
    }
  });

  loadAlerts();
})();
})();
</script>
</body>
</html>
