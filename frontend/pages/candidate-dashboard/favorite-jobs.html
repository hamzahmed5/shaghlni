  <!-- MAIN -->

<div id="toast-container"></div>
<script src="../../js/api.js"></script>
<script src="../../js/theme.js"></script>
  <script src="../../js/i18n.js"></script>
<script src="../../js/main.js"></script>
<script src='../../js/auth-guard.js'></script>
<script src="../../js/pages.js"></script>
<script>
(async () => {
  const user = await Session.requireLogin('candidate');

  // Populate user info
  const initials = user.name ? user.name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase() : 'U';
  document.getElementById('nav-user-avatar').textContent = initials;
  document.getElementById('sidebar-avatar').textContent = initials;
  document.getElementById('sidebar-name').textContent = user.name || 'Candidate';

  const grid = document.getElementById('favorites-grid');
  const countEl = document.getElementById('fav-count');

  function renderGrid(jobs) {
    countEl.textContent = jobs.length + ' saved job' + (jobs.length !== 1 ? 's' : '');
    if (!jobs.length) {
      grid.innerHTML = `<div style="text-align:center;padding:var(--sp-16);color:var(--clr-text-3)">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:var(--sp-4)"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <h3 style="font-size:var(--text-lg);font-weight:600;margin-bottom:var(--sp-2)">No saved jobs yet</h3>
        <p>Browse jobs and click the heart icon to save them here.</p>
      </div>`;
      return;
    }
    grid.innerHTML = jobs.map(j => {
      const jobId = j.job_id || j.id;
      const title = j.title || j.job_title || 'Untitled Job';
      const company = j.company || j.company_name || '';
      const location = j.location || '';
      const type = j.type || j.job_type || '';
      const salary = j.salary || '';
      return `<div style="background:var(--clr-white);border:1px solid var(--clr-border);border-radius:var(--r-lg);padding:var(--sp-5);display:flex;align-items:flex-start;justify-content:space-between;gap:var(--sp-4)">
        <div style="flex:1;min-width:0">
          <h3 style="font-size:var(--text-base);font-weight:600;color:var(--clr-text);margin-bottom:4px">
            <a href="../jobs/single-job.html?id=${jobId}" style="color:inherit;text-decoration:none">${title}</a>
          </h3>
          <p style="font-size:13px;color:var(--clr-text-2);margin-bottom:var(--sp-3)">${company}${location ? ' &bull; ' + location : ''}</p>
          <div style="display:flex;flex-wrap:wrap;gap:var(--sp-2)">
            ${type ? `<span style="font-size:12px;padding:3px 10px;background:var(--clr-primary-light);color:var(--clr-primary);border-radius:20px">${type}</span>` : ''}
            ${salary ? `<span style="font-size:12px;padding:3px 10px;background:#F1F2F4;color:var(--clr-text-2);border-radius:20px">${salary}</span>` : ''}
          </div>
        </div>
        <button onclick="removeFav(${jobId}, this)" style="flex-shrink:0;background:none;border:none;cursor:pointer;color:#E05151;padding:4px" title="Remove from favorites">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </div>`;
    }).join('');
  }

  let allFavorites = [];

  async function loadFavorites() {
    grid.innerHTML = `<div style="text-align:center;padding:var(--sp-10);color:var(--clr-text-3)">Loading…</div>`;
    try {
      const res = await API.getCandidateFavorites();
      allFavorites = Array.isArray(res.data) ? res.data : [];
      renderGrid(allFavorites);
    } catch {
      grid.innerHTML = `<div style="text-align:center;padding:var(--sp-10);color:var(--clr-text-3)">Failed to load favorites. Please try again.</div>`;
    }
  }

  window.removeFav = async function(jobId, btn) {
    btn.disabled = true;
    try {
      await API.removeFavorite(jobId);
      allFavorites = allFavorites.filter(j => (j.job_id || j.id) !== jobId);
      renderGrid(allFavorites);
    } catch {
      btn.disabled = false;
    }
  };

  await loadFavorites();
})();
</script>
