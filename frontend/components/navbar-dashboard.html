<!-- ============================================================
     navbar-dashboard.html — Dashboard Navbar (logged-in, 2-row)
     Used on all candidate + employer dashboard pages.
     Nav links and Post A Job button are customized via JS
     based on Session.getRole().
     ============================================================ -->
<header class="navbar-dashboard" id="navbar-dashboard">

  <!-- Row 1: Nav links + utility -->
  <div class="navbar-dashboard__top">
    <div class="navbar-dashboard__top-inner">

      <!-- Nav links (populated by JS based on role) -->
      <nav class="navbar-dashboard__nav" id="dash-nav-links" aria-label="Dashboard navigation">
        <!-- Candidate links (default) -->
        <a href="/jobpilot/frontend/index.html" class="navbar-dashboard__nav-link">Home</a>
        <a href="/jobpilot/frontend/pages/jobs/browse-jobs.html" class="navbar-dashboard__nav-link">Find Job</a>
        <a href="/jobpilot/frontend/pages/employers/browse-employers.html" class="navbar-dashboard__nav-link">Find Employers</a>
        <a href="/jobpilot/frontend/pages/candidate-dashboard/dashboard.html" class="navbar-dashboard__nav-link">Dashboard</a>
        <a href="/jobpilot/frontend/pages/candidate-dashboard/job-alerts.html" class="navbar-dashboard__nav-link">Job Alerts</a>
        <a href="/jobpilot/frontend/pages/static/contact.html" class="navbar-dashboard__nav-link">Customer Support</a>
      </nav>

      <!-- Utility: phone + language -->
      <div class="navbar-dashboard__utility">
        <span class="navbar-dashboard__phone">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.35 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 5.55 5.55l.96-.87a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          support@shaghlni.com
        </span>
        <div class="navbar-dashboard__lang dropdown" id="lang-dropdown-trigger" data-dropdown="lang-menu">
          <img src="/assets/icons/flag-en.svg" alt="English flag" onerror="this.style.display='none'">
          <span>English</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
          <div class="dropdown-menu" id="lang-menu">
            <div class="dropdown-item">EN — English</div>
            <div class="dropdown-item">AR — العربية</div>
          </div>
        </div>
      </div>

    </div>
  </div><!-- /.navbar-dashboard__top -->

  <!-- Row 2: Logo + Country + Search + Actions -->
  <div class="navbar-dashboard__bottom">
    <div class="navbar-dashboard__bottom-inner">

      <!-- Logo -->
      <a href="/jobpilot/frontend/index.html" class="navbar-dashboard__brand" aria-label="Shaghlni home">
        <img src="/jobpilot/frontend/assets/images/shaghlni-logo.jpeg" alt="Shaghlni" class="brand-logo-img brand-logo-img--nav">
      </a>

      <!-- Country selector -->
      <div class="navbar-dashboard__country dropdown" data-dropdown="country-menu">
        <img src="/assets/icons/flag-in.svg" alt="India" onerror="this.style.display='none'">
        <span>India</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
        <div class="dropdown-menu" id="country-menu">
          <div class="dropdown-item">IN — India</div>
          <div class="dropdown-item">US — United States</div>
          <div class="dropdown-item">GB — United Kingdom</div>
          <div class="dropdown-item">DE — Germany</div>
        </div>
      </div>

      <!-- Search bar -->
      <div class="navbar-dashboard__search input-group">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input
          type="search"
          class="form-input"
          placeholder="Job title, keyword, company"
          aria-label="Search jobs"
          id="navbar-search"
        >
      </div>

      <!-- Right actions -->
      <div class="navbar-dashboard__right">

        <!-- Post A Job (employer only, shown via JS) -->
        <a href="/jobpilot/frontend/pages/employer-dashboard/post-job.html" class="btn btn-outline navbar-dashboard__post-btn" id="navbar-post-btn" style="display:none">
          Post A Job
        </a>

        <!-- Notifications -->
        <button class="navbar-dashboard__notif" aria-label="Notifications" data-dropdown="notif-menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="navbar-dashboard__notif-badge">3</span>
        </button>

        <!-- Avatar / User menu -->
        <div class="dropdown" id="user-menu-trigger">
          <button class="navbar-dashboard__avatar-btn" data-dropdown="user-menu" aria-label="User menu">
            <img
              class="navbar-dashboard__avatar"
              src="/assets/images/default-avatar.png"
              alt="User avatar"
              id="navbar-avatar"
              onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22 viewBox=%220 0 40 40%22><rect width=%2240%22 height=%2240%22 rx=%2220%22 fill=%22%230A65CC%22/><text x=%2250%25%22 y=%2255%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2216%22 font-family=%22Inter,sans-serif%22 font-weight=%22600%22>U</text></svg>'"
            >
          </button>

          <div class="dropdown-menu" id="user-menu">
            <div class="dropdown-item" style="font-weight:600;color:var(--clr-text)" id="navbar-username">
              My Account
            </div>
            <hr class="dropdown-divider">
            <a href="/jobpilot/frontend/pages/candidate-dashboard/dashboard.html" class="dropdown-item">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              Dashboard
            </a>
            <a href="#" class="dropdown-item">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
              Profile
            </a>
            <hr class="dropdown-divider">
            <button class="dropdown-item danger" data-logout>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Log out
            </button>
          </div>
        </div>

      </div><!-- /.navbar-dashboard__right -->

      <!-- Mobile toggle -->
      <button class="navbar-toggle" data-sidebar-toggle aria-label="Toggle sidebar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

    </div>
  </div><!-- /.navbar-dashboard__bottom -->

</header>

<script>
  // Populate user info from session
  document.addEventListener('DOMContentLoaded', function applyDashNavSession() {
    const user = typeof Session !== 'undefined' ? Session.get() : null;
    if (!user) return;

    const base = typeof FRONTEND_BASE !== 'undefined' ? FRONTEND_BASE : '/jobpilot/frontend';
    const isEmployer = user.role === 'employer';

    const dashUrl = isEmployer
      ? base + '/pages/employer-dashboard/dashboard.html'
      : base + '/pages/candidate-dashboard/dashboard.html';

    const profileUrl = isEmployer
      ? base + '/pages/employer-dashboard/profile.html'
      : base + '/pages/candidate-dashboard/profile.html';

    // Username
    const nameEl = document.getElementById('navbar-username');
    if (nameEl) nameEl.textContent = user.name || user.email || 'My Account';

    // Fix user-menu dropdown links
    const userMenu = document.getElementById('user-menu');
    if (userMenu) {
      userMenu.querySelectorAll('a[href*="dashboard"]').forEach(a => a.setAttribute('href', dashUrl));
      userMenu.querySelectorAll('a[href="#"]').forEach(a => a.setAttribute('href', profileUrl));
    }

    if (isEmployer) {
      // Show Post A Job button
      const postBtn = document.getElementById('navbar-post-btn');
      if (postBtn) postBtn.style.display = 'flex';

      // Swap nav links for employer role
      const nav = document.getElementById('dash-nav-links');
      if (nav) {
        nav.innerHTML = `
          <a href="${base}/index.html" class="navbar-dashboard__nav-link">Home</a>
          <a href="${base}/pages/candidates/browse-candidates.html" class="navbar-dashboard__nav-link">Find Candidate</a>
          <a href="${base}/pages/employer-dashboard/dashboard.html" class="navbar-dashboard__nav-link">Dashboard</a>
          <a href="${base}/pages/employer-dashboard/my-jobs.html" class="navbar-dashboard__nav-link">My Jobs</a>
          <a href="${base}/pages/employer-dashboard/applications.html" class="navbar-dashboard__nav-link">Applications</a>
          <a href="${base}/pages/static/contact.html" class="navbar-dashboard__nav-link">Customer Support</a>
        `;
      }
    }
  });
</script>
